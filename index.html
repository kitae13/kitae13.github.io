<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>자기소개 페이지</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1 id="title">반기태</h1>
        <div id="content">
          <p>Kookmin University</p>
          <p>인공지능학부 25학번</p>
          <p>멋쟁이사자처럼 14기 | 백엔드</p>
        </div>
        <div class="divider"></div>
        <div class="comment" id="comment">
          <p>
            안녕하세요. 이번 멋쟁이사자처럼 14기 아기사자 백엔드 파트 반기태라고
            합니다. 아직 많이 부족하지만 열심히 하겟습니다. 잘 부탁드립니다!
          </p>
        </div>
      </div>
    </div>

    <div class="tab-menu">
      <button class="tab-btn active" data-tab="start">Start</button>
      <button class="tab-btn" data-tab="who">Who</button>
      <button class="tab-btn" data-tab="hobby">Hobby</button>
      <button class="tab-btn" data-tab="playlist">Playlist</button>
    </div>

    <script>
      const title = document.getElementById("title");
      const content = document.getElementById("content");
      const comment = document.getElementById("comment");
      const divider = document.querySelector(".divider");
      const buttons = document.querySelectorAll(".tab-btn");

      const data = {
        start: {
          title: "반기태",
          html: `
        <p>Kookmin University</p>
        <p>인공지능학부 25학번</p>
        <p>멋쟁이사자처럼 14기 | 백엔드</p>
      `,
          showComment: true,
        },
        who: {
          title: "Who",
          html: `
        <p>06년생</p>
        <p>인공지능학부 25학번</p>
        <p>INTP</p>
        <p>처음엔 조용하지만 친해지면 밝아져요</p>
      `,
          showComment: false,
        },
        hobby: {
          title: "Hobby",
          html: `
        <p>영화 보기</p>
        <p>배드민턴 치기</p>
        <p>게임하기</p>
      `,
          showComment: false,
        },
        playlist: {
          title: "Playlist",
          html: `
        <p>좋은 밤, 좋은 꿈(너드커넥션)</p>
        <p>autumn dream(엔플라잉)</p>
        <p>Orange(SPYAIR)</p>
      `,
          showComment: false,
        },
      };

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const tab = button.dataset.tab;
          title.textContent = data[tab].title;
          content.innerHTML = data[tab].html;

          if (data[tab].showComment) {
            comment.style.display = "block";
            divider.style.display = "block";
          } else {
            comment.style.display = "none";
            divider.style.display = "none";
          }

          buttons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
        });
      });
    </script>
  </body>
</html>
