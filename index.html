<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>자기소개 페이지</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1 id="title">나</h1>
        <div id="content">
          <p>Kookmin University</p>
          <p>인공지능학부 25학번</p>
          <p>멋쟁이사자처럼 14기 | 백엔드</p>
        </div>
      </div>
    </div>

    <div class="tab-menu">
      <button class="tab-btn active" data-tab="welcome">Welcome</button>
      <button class="tab-btn" data-tab="who">Who Am I</button>
      <button class="tab-btn" data-tab="hobby">Hobby</button>
      <button class="tab-btn" data-tab="playlist">Playlist</button>
    </div>

    <script>
      const title = document.getElementById("title");
      const content = document.getElementById("content");
      const buttons = document.querySelectorAll(".tab-btn");

      const data = {
        welcome: {
          title: "나",
          html: `
            <p>Kookmin University</p>
            <p>인공지능학부 25학번</p>
            <p>멋쟁이사자처럼 14기 | 백엔드</p>
          `,
        },
        who: {
          title: "Who Am I",
          html: `
            <p>새로운 사람들과 이야기하는 걸 좋아합니다.</p>
            <p>맡은 일은 책임감 있게 끝내려고 합니다.</p>
            <p>개발을 배우며 성장하는 중입니다.</p>
          `,
        },
        hobby: {
          title: "Hobby",
          html: `
            <p>영화 보기</p>
            <p>음악 듣기</p>
            <p>산책하기</p>
          `,
        },
        playlist: {
          title: "Playlist",
          html: `
            <p>잔잔한 노래</p>
            <p>집중할 때 듣는 음악</p>
            <p>밤에 듣기 좋은 플레이리스트</p>
          `,
        },
      };

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const tab = button.dataset.tab;
          title.textContent = data[tab].title;
          content.innerHTML = data[tab].html;

          buttons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
        });
      });
    </script>
  </body>
</html>
